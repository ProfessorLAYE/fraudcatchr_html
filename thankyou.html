<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>You're on the list — Fraudcatchr</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(135deg,#0F2D4A 0%,#1565C0 60%,#0F2D4A 100%);
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;
}
.card{
  max-width:560px;width:100%;
}
.icon{
  width:80px;height:80px;
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;margin:0 auto 32px;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:48px;font-weight:900;color:#ffffff;
  letter-spacing:-1px;line-height:1.1;margin-bottom:20px;
}
h1 em{color:#64B5F6;font-style:normal;}
p{
  font-size:18px;color:rgba(255,255,255,0.7);
  line-height:1.7;margin-bottom:48px;
}
.divider{
  width:60px;height:2px;
  background:rgba(255,255,255,0.2);
  margin:0 auto 48px;
}
.back-btn{
  display:inline-block;
  background:rgba(255,255,255,0.1);
  border:1.5px solid rgba(255,255,255,0.25);
  color:#ffffff;padding:14px 32px;
  border-radius:10px;font-size:15px;font-weight:600;
  text-decoration:none;font-family:'DM Sans',sans-serif;
  transition:background 0.2s;
}
.back-btn:hover{background:rgba(255,255,255,0.18);}
.footer-note{
  margin-top:48px;font-size:13px;
  color:rgba(255,255,255,0.3);
}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>You're on the <em>list.</em></h1>
    <p>Thank you for joining the Fraudcatchr waitlist. We'll be in touch as soon as we launch — you'll be among the first to protect your family.</p>
    <div class="divider"></div>
    <a href="/" class="back-btn">← Back to Fraudcatchr</a>
    <p class="footer-note">© 2026 Fraudcatchr. All rights reserved.</p>
  </div>
</body>
</html>
